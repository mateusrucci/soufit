name: Deploy -> HostGator

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: cPanel Git Pull
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Pull latest code on cPanel
        env:
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          curl --show-error --fail-with-body \
            -H "Authorization: cpanel mate9316:$CPANEL_API_TOKEN" \
            "https://br956.hostgator.com.br:2083/execute/VersionControl/update?repository_root=/home3/mate9316/lp.soufit.com&branch=main"

      - name: Trigger cPanel Git Deploy via API
        env:
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          curl --show-error --fail-with-body \
            -H "Authorization: cpanel mate9316:$CPANEL_API_TOKEN" \
            "https://br956.hostgator.com.br:2083/execute/VersionControlDeployment/create?repository_root=/home3/mate9316/lp.soufit.com"

      - name: Publish shared + entry HTML files
        env:
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          publish_file() {
            local dir="$1" file="$2" source="$3"
            curl --show-error --fail-with-body \
              -H "Authorization: cpanel mate9316:$CPANEL_API_TOKEN" \
              --data-urlencode "dir=$dir" \
              --data-urlencode "file=$file" \
              --data-urlencode "content@$source" \
              "https://br956.hostgator.com.br:2083/execute/Fileman/save_file_content" >/dev/null
          }

          # Shared scripts -> raiz publica (git pull deixa em shared/, precisam estar na raiz)
          publish_file "/home3/mate9316/lp.soufit.com" "utm-forwarder.js"  "shared/utm-forwarder.js"
          publish_file "/home3/mate9316/lp.soufit.com" "meta-tracking.js"  "shared/meta-tracking.js"
          publish_file "/home3/mate9316/lp.soufit.com" "meta-capi.php"     "shared/meta-capi.php"
          publish_file "/home3/mate9316/lp.soufit.com" "ac-submit.php"     "shared/ac-submit.php"
          publish_file "/home3/mate9316/lp.soufit.com" "ac-form.js"        "shared/ac-form.js"
          publish_file "/home3/mate9316/lp.soufit.com" ".htaccess"         "shared/root.htaccess"
          publish_file "/home3/mate9316/lp.soufit.com" "robots.txt"        "shared/robots.txt"


          publish_file "/home3/mate9316/lp.soufit.com/fitmoderno-2" "index.html" "fitmoderno-2/index.html"

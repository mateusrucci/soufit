name: Deploy lp.soufit.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deploy folders
        run: |
          mkdir -p dist/lp.soufit.com/fitmoderno
          cp shared/utm-forwarder.js dist/lp.soufit.com/
          cp -R sites/fitmoderno/index.html sites/fitmoderno/cdn-cgi sites/fitmoderno/fonts.googleapis.com sites/fitmoderno/fonts.gstatic.com sites/fitmoderno/use.typekit.net sites/fitmoderno/wp-content sites/fitmoderno/wp-includes dist/lp.soufit.com/fitmoderno/

      - name: Deploy lp.soufit.com package
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTGATOR_FTP_SERVER }}
          username: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          password: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          local-dir: ./dist/lp.soufit.com/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
          dangerous-clean-slate: true

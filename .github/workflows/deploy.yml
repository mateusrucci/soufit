name: Deploy -> HostGator

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: cPanel Git Pull
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest code on cPanel
        env:
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          curl -s --fail \
            -H "Authorization: cpanel mate9316:$CPANEL_API_TOKEN" \
            "https://soufit.com:2083/execute/VersionControl/update?repository_root=/home3/mate9316/repositories/lp.soufit.com&branch=main"

      - name: Trigger cPanel Git Deploy via API
        env:
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          curl -s --fail \
            -H "Authorization: cpanel mate9316:$CPANEL_API_TOKEN" \
            "https://soufit.com:2083/execute/VersionControlDeployment/create?repository_root=/home3/mate9316/repositories/lp.soufit.com"

---
deployment:
  tasks:
    - echo "Deploying validated lp.soufit.com package"
    - export BASEPATH=$HOME/lp.soufit.com/
    - /bin/rm -f $BASEPATH/index.html
    - /bin/cp shared/root.htaccess $BASEPATH/.htaccess
    - /bin/cp shared/robots.txt $BASEPATH/robots.txt
    - /bin/cp shared/utm-forwarder.js $BASEPATH/utm-forwarder.js
    - /bin/cp shared/meta-tracking.js $BASEPATH/meta-tracking.js
    - /bin/cp shared/meta-capi.php $BASEPATH/meta-capi.php
    - /bin/cp shared/ac-submit.php $BASEPATH/ac-submit.php
    - /bin/cp shared/ac-form.js $BASEPATH/ac-form.js
    - /bin/mkdir -p $BASEPATH/protocolo-magra-em-casa/wp-content
    - /bin/cp protocolo-magra-em-casa/index.html $BASEPATH/protocolo-magra-em-casa/index.html
    - /bin/rm -rf $BASEPATH/protocolo-magra-em-casa/wp-content/plugins $BASEPATH/protocolo-magra-em-casa/wp-content/themes $BASEPATH/protocolo-magra-em-casa/wp-includes $BASEPATH/protocolo-magra-em-casa/use.typekit.net
    - /bin/cp -R protocolo-magra-em-casa/wp-content/uploads $BASEPATH/protocolo-magra-em-casa/wp-content/uploads
    - /bin/mkdir -p $BASEPATH/fitmoderno
    - /bin/cp fitmoderno/index.html $BASEPATH/fitmoderno/index.html
    - /bin/cp fitmoderno/.htaccess $BASEPATH/fitmoderno/.htaccess || true
    - /bin/cp -R fitmoderno/assets $BASEPATH/fitmoderno/assets
    - /bin/cp -R fitmoderno/assets-inc $BASEPATH/fitmoderno/assets-inc
    - /bin/cp -R fitmoderno/fonts.googleapis.com $BASEPATH/fitmoderno/fonts.googleapis.com
    - /bin/cp -R fitmoderno/fonts.gstatic.com $BASEPATH/fitmoderno/fonts.gstatic.com
    - /bin/cp -R fitmoderno/use.typekit.net $BASEPATH/fitmoderno/use.typekit.net
    - /bin/cp -R fitmoderno/cdn-cgi $BASEPATH/fitmoderno/cdn-cgi || true

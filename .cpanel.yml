---
deployment:
  tasks:
    - echo "Deploying validated lp.soufit.com package"
    - export BASEPATH=$HOME/lp.soufit.com/
    - /bin/rm -f $BASEPATH/index.html
    - /bin/cp shared/root.htaccess $BASEPATH/.htaccess
    - /bin/cp shared/robots.txt $BASEPATH/robots.txt
    - /bin/cp shared/utm-forwarder.js $BASEPATH/utm-forwarder.js
    - /bin/cp shared/meta-tracking.js $BASEPATH/meta-tracking.js
    - /bin/cp shared/meta-capi.php $BASEPATH/meta-capi.php
    - /bin/cp shared/ac-submit.php $BASEPATH/ac-submit.php
    - /bin/cp shared/ac-form.js $BASEPATH/ac-form.js
    - /bin/rm -rf $BASEPATH/fitmoderno-2
    - /bin/mkdir -p $BASEPATH/fitmoderno
    - /bin/cp fitmoderno/index.html $BASEPATH/fitmoderno/index.html
    - /bin/rm -rf $BASEPATH/fitmoderno/assets
    - /bin/cp -R fitmoderno/assets $BASEPATH/fitmoderno/assets
    - /bin/mkdir -p $BASEPATH/lp-protocolo-magra-em-casa
    - /bin/cp lp-protocolo-magra-em-casa/index.html $BASEPATH/lp-protocolo-magra-em-casa/index.html
    - /bin/rm -rf $BASEPATH/lp-protocolo-magra-em-casa/assets
    - /bin/cp -R lp-protocolo-magra-em-casa/assets $BASEPATH/lp-protocolo-magra-em-casa/assets
    - /bin/mkdir -p $BASEPATH/lp-protocolo-magra-em-casa-obg
    - /bin/cp lp-protocolo-magra-em-casa-obg/index.html $BASEPATH/lp-protocolo-magra-em-casa-obg/index.html
    - /bin/rm -rf $BASEPATH/lp-protocolo-magra-em-casa-obg/assets
    - /bin/cp -R lp-protocolo-magra-em-casa-obg/assets $BASEPATH/lp-protocolo-magra-em-casa-obg/assets

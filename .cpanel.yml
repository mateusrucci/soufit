---
deployment:
  tasks:
    - echo "Deploying validated lp.soufit.com package"
    - export BASEPATH=$HOME/lp.soufit.com/
    - export DEPLOYPATH=$HOME/lp.soufit.com/fitmoderno/
    - /bin/mkdir -p $BASEPATH
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/mkdir -p $BASEPATH/lp-protocolo-magra-em-casa
    - /bin/rm -f $BASEPATH/index.html
    - /bin/cp shared/root.htaccess $BASEPATH/.htaccess
    - /bin/cp shared/robots.txt $BASEPATH/robots.txt
    - /bin/cp shared/utm-forwarder.js $BASEPATH/utm-forwarder.js
    - /bin/cp shared/meta-tracking.js $BASEPATH/meta-tracking.js
    - /bin/cp shared/meta-capi.php $BASEPATH/meta-capi.php
    - /bin/cp sites/fitmoderno/.htaccess $DEPLOYPATH/.htaccess
    - /bin/cp -R sites/fitmoderno/index.html sites/fitmoderno/cdn-cgi sites/fitmoderno/fonts.googleapis.com sites/fitmoderno/fonts.gstatic.com sites/fitmoderno/use.typekit.net sites/fitmoderno/wp-content sites/fitmoderno/wp-includes $DEPLOYPATH
    - /bin/cp -R sites/lp-protocolo-magra/lp-protocolo-magra-em-casa/. $BASEPATH/lp-protocolo-magra-em-casa/
    - /bin/cp -R sites/lp-protocolo-magra/wp-content $BASEPATH
    - /bin/cp -R sites/lp-protocolo-magra/wp-includes $BASEPATH
    - /bin/cp -R sites/lp-protocolo-magra/fonts.googleapis.com $BASEPATH
    - /bin/cp -R sites/lp-protocolo-magra/fonts.gstatic.com $BASEPATH
    - /bin/cp -R sites/lp-protocolo-magra/use.typekit.net $BASEPATH
